<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <!--
        viewport-fit=cover：让内容延伸到 safe-area（刘海/圆角屏）
        interactive-widget=resizes-content：软键盘弹出时内容区收缩而非整体上移
    -->
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
          name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
    <title>FlowCloudAI</title>
    <style>
        /*
         * 关键渲染路径 CSS —— 内联在此，WebView 解析 HTML 后立即生效，
         * 无需等待 JS bundle 加载完成。
         */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* 页面底色与 React 渲染后的主题匹配，避免闪白 */
        body {
            background: #ffffff;
            color: #111111;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #111111;
                color: #f0f0f0;
            }
        }

        /* 亚克力毛玻璃模式：启动期也保持 body 透明，避免不透明底色盖住磨砂层 */
        html[data-backdrop="acrylic"] body {
            background: transparent;
        }

        /*
         * 当 #root 为空（React 尚未挂载）时显示 loading 指示器。
         * React render() 后 #root 不再为空，:empty 自动失效，
         * spinner 消失，无需任何 JS。
         */
        #root:empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            height: 100vh;
            height: 100dvh;
        }

        #root:empty::before {
            content: 'FlowCloudAI';
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.04em;
            opacity: 0.45;
        }

        #root:empty::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid rgba(128, 128, 128, 0.2);
            border-top-color: rgba(128, 128, 128, 0.65);
            border-radius: 50%;
            animation: fc-spin 0.75s linear infinite;
        }

        @keyframes fc-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>

[package]
name = "FlowCloudAI"
version = "0.1.0"
description = "A Tauri App"
authors = ["flowcloudai"]
license = "MIT"
repository = ""
edition = "2024"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.3", features = [] }

[dependencies]
log = "0.4"
tauri = { version = "2", features = ["unstable", "protocol-asset"] }
tokio = { version = "1.50", features = ["full"] }
serde_json = "1.0"
futures = "0.3"
tauri-plugin-single-instance = "2"
tauri-plugin-log = "2"
serde = { version = "1.0", features = ["derive"] }
keyring = { version = "3", features = ["windows-native"] }
anyhow = "1"
worldflow_core = { git = "ssh://git@github.com/FlowCloudAI/Worldflow_Core", branch = "main" }
flowcloudai_client = { git = "ssh://git@github.com/FlowCloudAI/AI_Client_Core", branch = "main" }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
base64 = "0.22.1"
quick-xml = "0.39"
reqwest = { version = "0.13.2", features = ["json", "multipart"] }
zip = { version = "8", default-features = false, features = ["deflate"] }
uuid = { version = "1", features = ["v4"] }
mime_guess = "2"
urlencoding = "2"
scraper = "0.26.0"
ego-tree = "0.11.0"
semver = "1"
